<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtraDock Release Notes</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        div[data-sparkle-version] {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #1d1d1f;
            font-size: 24px;
            margin-top: 0;
            border-bottom: 2px solid #0066cc;
            padding-bottom: 8px;
        }

        h3 {
            color: #484848;
            font-size: 20px;
            margin-top: 24px;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin: 8px 0;
        }

        strong {
            color: #0066cc;
        }

        em {
            color: #666;
            font-style: italic;
        }

        div.sparkle-installed-version {
            opacity: 0.7;
            position: relative;
        }

        div.sparkle-installed-version::after {
            content: "Current Version";
            position: absolute;
            top: 12px;
            right: 12px;
            background: #0066cc;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        div.sparkle-installed-version~div {
            display: none;
        }
    </style>
</head>

<body>
</body>

</html>
